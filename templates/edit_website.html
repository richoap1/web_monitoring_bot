<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Website</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>Edit Website</h2>
    <form method="POST">
        <div class="mb-3">
            <label for="webname" class="form-label">Nama Website</label>
            <input type="text" name="webname" id="webname" class="form-control" value="{{ website[1] }}" required>
        </div>
        <div class="mb-3">
            <label for="url" class="form-label">URL Website</label>
            <input type="text" name="url" id="url" class="form-control" value="{{ website[2] }}" required>
        </div>
        <button type="submit" class="btn btn-primary">Update</button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">Kembali</a>
    </form>
</body>
</html>
