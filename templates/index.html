<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2 class="text-center mb-4">Daftar Website</h2>
        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>Nama</th>
                    <th>URL</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody>
                {% for website in websites %}
                <tr>
                    <td>{{ website[1] }}</td>
                    <td><a href="{{ website[2] }}" target="_blank">{{ website[2] }}</a></td>
                    <td>{{ website[3] }}</td>
                    <td>
                        <a href="/edit/{{ website[0] }}" class="btn btn-warning btn-sm">Edit</a>
                        <a href="/delete/{{ website[0] }}" class="btn btn-danger btn-sm">Hapus</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        
        <h3 class="mt-4">Tambah Website</h3>
        <form action="/add" method="post" class="mt-3">
            <div class="mb-3">
                <label for="webname" class="form-label">Nama Website</label>
                <input type="text" class="form-control" id="webname" name="webname" required>
            </div>
            <div class="mb-3">
                <label for="url" class="form-label">URL</label>
                <input type="url" class="form-control" id="url" name="url" required>
            </div>
            <button type="submit" class="btn btn-primary">Tambah</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
